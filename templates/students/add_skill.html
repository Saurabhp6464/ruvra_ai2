{% extends 'base.html' %}

{% block title %}Add Skill - RUVRA AI{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-plus-circle"></i> Add New Skill</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="skill_name" class="form-label">Skill Name</label>
                            <input type="text" class="form-control" id="skill_name" name="skill_name" 
                                   placeholder="e.g., Python, Java, React" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="proficiency" class="form-label">Proficiency Level</label>
                            <select class="form-select" id="proficiency" name="proficiency" required>
                                <option value="">Select Proficiency</option>
                                <option value="beginner">Beginner</option>
                                <option value="intermediate">Intermediate</option>
                                <option value="advanced">Advanced</option>
                                <option value="expert">Expert</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="years_of_experience" class="form-label">Years of Experience</label>
                            <input type="number" class="form-control" id="years_of_experience" 
                                   name="years_of_experience" min="0" max="10" step="0.5" value="0" required>
                            <small class="form-text text-muted">Enter in years (e.g., 1.5 for 1.5 years)</small>
                        </div>
                        
                        <div class="alert alert-info">
                            <i class="bi bi-lightbulb"></i> <strong>Tip:</strong> Add all your relevant technical and soft skills to improve job matching.
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Add Skill
                            </button>
                            <a href="{% url 'students:dashboard' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
