{% extends 'base.html' %}

{% block title %}Dashboard - RUVRA AI{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <h2 class="mb-4">
        <i class="bi bi-speedometer2"></i> Dashboard
    </h2>
    
    <div class="alert alert-info">
        <i class="bi bi-info-circle"></i> Welcome, {{ user.get_full_name }}! 
        You are logged in as <strong>{{ user.get_user_type_display }}</strong>
    </div>
    
    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Quick Actions</h5>
                    <div class="d-flex gap-2">
                        <a href="{% url 'accounts:profile' %}" class="btn btn-primary">
                            <i class="bi bi-person"></i> View Profile
                        </a>
                        <a href="{% url 'jobs:job_list' %}" class="btn btn-outline-primary">
                            <i class="bi bi-briefcase"></i> Browse Jobs
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
