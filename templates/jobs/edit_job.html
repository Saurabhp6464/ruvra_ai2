{% extends 'base.html' %}

{% block title %}Edit Job - RUVRA AI{% endblock %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-pencil-square"></i> Edit Job</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <!-- Basic Information -->
                        <h5 class="mb-3"><i class="bi bi-info-circle"></i> Basic Information</h5>
                        <div class="row mb-3">
                            <div class="col-md-8">
                                <label class="form-label">Job Title <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="title" value="{{ job.title }}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Job Type <span class="text-danger">*</span></label>
                                <select class="form-select" name="job_type" required>
                                    <option value="full-time" {% if job.job_type == 'full-time' %}selected{% endif %}>Full Time</option>
                                    <option value="part-time" {% if job.job_type == 'part-time' %}selected{% endif %}>Part Time</option>
                                    <option value="internship" {% if job.job_type == 'internship' %}selected{% endif %}>Internship</option>
                                    <option value="contract" {% if job.job_type == 'contract' %}selected{% endif %}>Contract</option>
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Work Mode <span class="text-danger">*</span></label>
                                <select class="form-select" name="work_mode" required>
                                    <option value="onsite" {% if job.work_mode == 'onsite' %}selected{% endif %}>Onsite</option>
                                    <option value="remote" {% if job.work_mode == 'remote' %}selected{% endif %}>Remote</option>
                                    <option value="hybrid" {% if job.work_mode == 'hybrid' %}selected{% endif %}>Hybrid</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Location <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="location" value="{{ job.location }}" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Job Description <span class="text-danger">*</span></label>
                            <textarea class="form-control" name="description" rows="4" required>{{ job.description }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Key Responsibilities</label>
                            <textarea class="form-control" name="responsibilities" rows="3">{{ job.responsibilities }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Benefits & Perks</label>
                            <textarea class="form-control" name="benefits" rows="2">{{ job.benefits }}</textarea>
                        </div>

                        <hr>

                        <!-- Requirements -->
                        <h5 class="mb-3"><i class="bi bi-clipboard-check"></i> Requirements</h5>
                        <div class="mb-3">
                            <label class="form-label">Required Skills <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="required_skills" value="{{ job.required_skills }}" required>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label">Minimum CGPA <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" name="min_cgpa" step="0.01" value="{{ job.min_cgpa }}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Min Experience (months)</label>
                                <input type="number" class="form-control" name="min_experience" value="{{ job.min_experience }}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Max Experience (months)</label>
                                <input type="number" class="form-control" name="max_experience" value="{{ job.max_experience|default:'' }}">
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Eligible Departments <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="eligible_departments" value="{{ job.eligible_departments }}" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Eligible Batches <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="eligible_batches" value="{{ job.eligible_batches }}" required>
                            </div>
                        </div>

                        <hr>

                        <!-- Compensation -->
                        <h5 class="mb-3"><i class="bi bi-cash-stack"></i> Compensation</h5>
                        <div class="row mb-3">
                            <div class="col-md-5">
                                <label class="form-label">Minimum Salary <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" name="min_salary" step="0.01" value="{{ job.min_salary }}" required>
                            </div>
                            <div class="col-md-5">
                                <label class="form-label">Maximum Salary <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" name="max_salary" step="0.01" value="{{ job.max_salary }}" required>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Currency</label>
                                <select class="form-select" name="currency">
                                    <option value="INR" {% if job.currency == 'INR' %}selected{% endif %}>INR</option>
                                    <option value="USD" {% if job.currency == 'USD' %}selected{% endif %}>USD</option>
                                    <option value="EUR" {% if job.currency == 'EUR' %}selected{% endif %}>EUR</option>
                                </select>
                            </div>
                        </div>

                        <hr>

                        <!-- Other Details -->
                        <h5 class="mb-3"><i class="bi bi-gear"></i> Other Details</h5>
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label">Number of Vacancies <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" name="vacancies" value="{{ job.vacancies }}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Application Deadline <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" name="application_deadline" value="{{ job.application_deadline|date:'Y-m-d' }}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Status <span class="text-danger">*</span></label>
                                <select class="form-select" name="status">
                                    <option value="draft" {% if job.status == 'draft' %}selected{% endif %}>Draft</option>
                                    <option value="published" {% if job.status == 'published' %}selected{% endif %}>Published</option>
                                    <option value="closed" {% if job.status == 'closed' %}selected{% endif %}>Closed</option>
                                    <option value="on-hold" {% if job.status == 'on-hold' %}selected{% endif %}>On Hold</option>
                                </select>
                            </div>
                        </div>

                        <hr>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Update Job
                            </button>
                            <a href="{% url 'jobs:job_detail' job.pk %}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-circle"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
